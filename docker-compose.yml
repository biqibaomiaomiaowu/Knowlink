services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: uvicorn server.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: python -m server.tasks.worker
    env_file:
      - .env.example
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
      - redis
      - minio

  scheduler:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: python -m server.tasks.scheduler
    env_file:
      - .env.example
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowlink
      POSTGRES_USER: knowlink
      POSTGRES_PASSWORD: knowlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
